<!--
when you click the three lines
find 'demo'
if the list doesn't include 'w3-show', it shows '-1', which means it's missing
if it's missing, add it
if it's there, hide it
-->
<script>
function hamburger() {
  var x = document.getElementById("demo");
  if (x.className.indexOf("w3-show") == -1) {
    x.className += " w3-show";
  } else { 
    x.className = x.className.replace(" w3-show", "");
  }
}
function blurAnImage() {
    blurredImage = document.getElementById("blur");
    if (blurredImage.style.filter == "blur(10px)"){
        blurredImage.style.filter = "blur(0px)";
    } else {
    blurredImage.style.filter = ("blur(10px)");
    }
}
        function search() {
          document.getElementById("myDropdown").classList.toggle("show");
        }

        function filterFunction() {
          const input = document.getElementById("myInput");
          const filter = input.value.toUpperCase();
          const div = document.getElementById("myDropdown");
          const a = div.getElementsByTagName("a");
          for (let i = 0; i < a.length; i++) {
            txtValue = a[i].textContent || a[i].innerText;
            if (txtValue.toUpperCase().indexOf(filter) > -1) {
              a[i].style.display = "";
            } else {
              a[i].style.display = "none";
            }
          }
        }
</script>
<!--
when you click the search button

-->
<!--
when you start searching
get the input
turn all case uppercase so it isn't case-sensitive
get the dropdown list
find all 'a' links inside the container
loop through the links
retrieve the content of the links
if the search text exists within the links
make it visible

hide it
