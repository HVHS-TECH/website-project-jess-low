<script>
function hamburger() {
  var x = document.getElementById("demo");
  if (x.className.indexOf("w3-show") == -1) {
    x.className += " w3-show";
  } else { 
    x.className = x.className.replace(" w3-show", "");
  }
}
function blurAnImage() {
    blurredImage = document.getElementById("blur");
    if (blurredImage.style.filter == "blur(10px)"){
        blurredImage.style.filter = "blur(0px)";
    } else {
    blurredImage.style.filter = ("blur(10px)");
    }
}
