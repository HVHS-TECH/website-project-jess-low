<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Page Title</title>
    <link href="style.css" rel="stylesheet">
    <style>
        body{
            margin: 0px;
            padding: 0px;
        }
        
        ul{
            list-style-type: none;
            margin: 0px;
            padding: 0px;
            overflow: hidden;
            background-color: brown;
        }
        ul li{
            float: left;
        }
        ul li a{
            display: block;
            color: white;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
        }
        ul li a:hover {
            background-color: darkgoldenrod;
        }
    </style>
</head>
<body>
    <ul>
        <li><a href="#home"></a></li>
        <li><a href="#pg1"></a></li>
        <li><a href="#another"></a></li>
        <li><a href="#onemore"></a></li>
    </ul>

<h2>This is a Heading</h1>
<p>This is a paragraph.</p>

</body>
</html>
